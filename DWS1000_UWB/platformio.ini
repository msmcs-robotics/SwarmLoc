[platformio]
default_envs = uno_tag

; --- Common settings for all DW1000-ng environments ---
[env_ng_common]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = SPI, Wire
lib_extra_dirs = lib
build_flags =
    -I lib/DW1000-ng/src
    -I include
    -std=gnu++11

; --- Anchor (responder): flash to ACM0 ---
[env:uno_anchor]
extends = env_ng_common
build_src_filter = -<*> +<anchor_main.cpp>

; --- Tag (initiator): flash to ACM1 ---
[env:uno_tag]
extends = env_ng_common
build_src_filter = -<*> +<tag_main.cpp>

; --- Calibration mode: antenna delay calibration + OLED ---
[env:uno_calibration]
extends = env_ng_common
build_src_filter = -<*> +<calibration_main.cpp>
build_flags =
    ${env_ng_common.build_flags}
    -D CALIBRATION_MODE
    -D USE_OLED_DISPLAY

; --- Legacy thotro library (deprecated, kept for reference) ---
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = SPI
lib_extra_dirs = lib
build_flags = -I lib/DW1000/src
